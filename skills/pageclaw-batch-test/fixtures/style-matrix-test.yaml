version: "1.0"

metadata:
  author: pageclaw-batch-test
  created: "2026-04-16"
  description: Minimal test matrix for validating pageclaw-batch pipeline

styles:
  - id: "01-sidebar-brutalist"
    layout: sticky-sidebar-left
    aesthetic: Brutalist Academic
    colors:
      primary: "#000000"
      secondary: "#ffffff"
      background: "#f5f5f0"
      surface: "#ffffff"
      accent: "#ff3300"
      text: "#1a1a1a"
    typography:
      heading_font: "Space Mono, monospace"
      body_font: "IBM Plex Sans, sans-serif"
      heading_weight: 700
      body_weight: 400
    decorative_rules:
      - "No border-radius anywhere"
      - "1px solid black borders on all containers"
      - "No drop shadows"
      - "No gradients"

  - id: "02-centered-minimal"
    layout: single-centered-column
    aesthetic: Museum Whitespace
    colors:
      primary: "#2c2c2c"
      secondary: "#8a8a8a"
      background: "#fafafa"
      surface: "#ffffff"
      accent: "#0055ff"
      text: "#333333"
    typography:
      heading_font: "Cormorant Garamond, serif"
      body_font: "Source Sans 3, sans-serif"
      heading_weight: 600
      body_weight: 400
    decorative_rules:
      - "No borders on containers"
      - "Extreme whitespace between sections"
      - "Thin hairline dividers only"

  - id: "03-topnav-editorial"
    layout: top-nav-single-column
    aesthetic: Editorial Serif
    colors:
      primary: "#1b1b1b"
      secondary: "#6b4f3a"
      background: "#fdf8f3"
      surface: "#fff9f2"
      accent: "#c0392b"
      text: "#2d2d2d"
    typography:
      heading_font: "Playfair Display, serif"
      body_font: "Lora, serif"
      heading_weight: 800
      body_weight: 400
    decorative_rules:
      - "Drop caps on first paragraph of each section"
      - "Decorative thin rules above section headings"
      - "No border-radius larger than 2px"
